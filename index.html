<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Gossip</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{ font-family:"Helvetica Neue",Arial,sans-serif; background:#000; color:#fff; min-height:100vh; }

        .header{ text-align:center; padding:70px 20px 40px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
        .logo{ font-size:64px; letter-spacing:10px; font-weight:300; color:#ff2d87; }
        .school{ margin-top:6px; font-size:14px; letter-spacing:3px; color:#aaa; }
        .tagline{ margin-top:14px; font-size:16px; color:#bbb; font-style:italic; }

        .container{ max-width:820px; margin:auto; padding:40px 20px; }

        .post-box{ background:#0c0c0c; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:30px; margin-bottom:40px; }
        .post-box h2{ font-weight:500; margin-bottom:18px; color:#ff2d87; }
        textarea{ width:100%; background:#000; border:1px solid rgba(255,255,255,0.1); color:white; padding:16px; border-radius:10px; font-size:14px; min-height:120px; resize:none; }
        button{ margin-top:18px; width:100%; background:#ff2d87; border:none; padding:14px; border-radius:10px; color:white; font-size:15px; font-weight:600; cursor:pointer; transition:.25s; }
        button:hover{ background:#ff4fa0; }
        button:disabled{ background:#666; cursor:not-allowed; }

        .feed-title{ font-size:22px; margin-bottom:20px; font-weight:500; }
        .post{ background:#0c0c0c; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:22px; margin-bottom:18px; animation:fade .3s ease; }
        .post-time{ font-size:12px; color:#888; margin-bottom:6px; }
        .post-text{ font-size:15px; line-height:1.6; }
        .badge{ display:inline-block; font-size:11px; padding:4px 8px; border-radius:6px; background:#ff2d87; margin-right:6px; }

        .trending{ background:#0c0c0c; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px; margin-bottom:35px; }
        .trending h3{ margin-bottom:10px; font-weight:500; color:#ff2d87; }
        .trend{ font-size:13px; margin-bottom:6px; color:#aaa; }

        .footer{ text-align:center; padding:60px 20px; color:#ff2d87; font-size:18px; font-style:italic; }
        .blast{ position:fixed; top:20px; right:20px; background:#111; border:1px solid rgba(255,255,255,0.1); padding:16px 20px; border-radius:10px; color:#fff; display:none; box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:1000; }
        .blast.success{ background:#2d7d2d; }
        .blast.error{ background:#d32f2f; }

        @keyframes fade{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">GOSSIP GIRL</div>
        <div class="school">BMI — Beaconhouse Margalla Campus</div>
        <div class="tagline">Spotted: secrets around Beaconhouse that refuse to stay quiet.</div>
    </div>

    <div class="container">
        <div class="post-box">
            <h2>Send a tip</h2>
            <form id="gossipForm">
                <textarea id="gossipText" placeholder="Spotted: someone leaving the cafeteria with someone they definitely shouldn't be with..." required></textarea>
                <button type="submit" id="submitBtn">Submit anonymously</button>
            </form>
        </div>

        <div class="trending">
            <h3>Trending at BMI</h3>
            <div class="trend">#CafeteriaDrama</div>
            <div class="trend">#LibrarySpotted</div>
            <div class="trend">#SecretCouples</div>
        </div>

        <div class="feed-title">Latest blasts</div>
        <div id="gossipList">
            <div class="post">Loading latest gossip...</div>
        </div>
    </div>

    <div class="footer">
        You know you love me.<br>
        XOXO, Gossip Girl
    </div>

    <div id="blast" class="blast"></div>

    <script>
        // Use localStorage for GitHub Pages (no backend needed)
        let gossips = JSON.parse(localStorage.getItem('gossips') || '[]');
        
        // Add some default gossips if empty
        if (gossips.length === 0) {
            gossips = [
                {
                    id: 1,
                    text: "Someone leaving the sports ground with the one person they swore they hated. Interesting.",
                    timestamp: new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: 2,
                    text: "Looks like someone's pretending they don't read this page. Nice try.",
                    timestamp: new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString()
                }
            ];
            localStorage.setItem('gossips', JSON.stringify(gossips));
        }
        
        // Load gossips on page load
        document.addEventListener('DOMContentLoaded', renderGossips);
        
        // Form submission
        document.getElementById("gossipForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const text = document.getElementById("gossipText").value;
            const submitBtn = document.getElementById("submitBtn");
            
            if (!text || text.trim().length === 0) {
                showBlast('Please write something before submitting!', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Posting...';
            
            // Add new gossip
            const newGossip = {
                id: Date.now(),
                text: text.trim(),
                timestamp: new Date().toISOString()
            };
            
            gossips.unshift(newGossip);
            localStorage.setItem('gossips', JSON.stringify(gossips));
            
            document.getElementById("gossipForm").reset();
            showBlast('✅ New gossip blast posted!', 'success');
            renderGossips();
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit anonymously';
        });
        
        // Render gossips
        function renderGossips() {
            const list = document.getElementById("gossipList");
            
            if (gossips.length === 0) {
                list.innerHTML = '<div class="post">No gossip yet... Be the first to spill the tea! ☕</div>';
                return;
            }
            
            list.innerHTML = gossips.map(g => `
                <div class="post">
                    <div class="post-time">${timeAgo(new Date(g.timestamp))}</div>
                    <div class="post-text">
                        <span class="badge">Spotted</span>${g.text}
                    </div>
                </div>
            `).join('');
        }
        
        // Time ago function
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            const intervals = {
                year: 31536000,
                month: 2592000,
                day: 86400,
                hour: 3600,
                minute: 60
            };
            
            for (let i in intervals) {
                const interval = Math.floor(seconds / intervals[i]);
                if (interval >= 1) {
                    return interval + " " + i + (interval > 1 ? "s" : "") + " ago";
                }
            }
            return "just now";
        }
        
        // Show notification
        function showBlast(message, type = 'success') {
            const blast = document.getElementById("blast");
            blast.textContent = message;
            blast.className = 'blast ' + type;
            blast.style.display = "block";
            
            setTimeout(() => {
                blast.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
